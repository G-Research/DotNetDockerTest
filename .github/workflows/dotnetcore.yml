name: .NET Core

on:
  push:
    branches: [ master ]
    tags: [ v* ]
  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5 # v2.7.0
      with: 
        fetch-depth: 0 # avoid shallow clone so nbgv can do its work.
    - name: Setup .NET Core
      uses: actions/setup-dotnet@871f041373faaad213a635d9afb62905ec029bbb # v1.10.1
      with:
        dotnet-version: |
          7.0.x
          8.0.x
          10.0.x
    - name: Build with dotnet
      run: dotnet build --configuration Release
    - name: Test with dotnet test
      run: dotnet test --configuration Release --no-build
    - name: Nerdbank.GitVersioning
      uses: dotnet/nbgv@705dad19ab067f12f4e9eeaa60812e01edef5d25 # v0.5.2
      with:
        setAllVars: true
    - run: echo "Package generated artefacts/DotNetDockerTest.${NBGV_NuGetPackageVersion}.nupkg"
    - name: Publish to NuGet
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
      run: dotnet nuget push artefacts/DotNetDockerTest.${{ env.NBGV_NuGetPackageVersion }}.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
